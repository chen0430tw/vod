# VOD-300M with HVBD anchor + dilution.
# Per guide §7.2 first B200 run #4.
experiment_name: vod_300m_hvbd
model:
  arch: NativeVOD
  channels: 8
  hidden: 384
  time_dim: 96
  backbone: unet
  param_target: 300_000_000
  rgb_head: true
data:
  source: anchor_plus_dilution
  primary: imagenet100   # scale up from CIFAR
  image_size: 64
  train_n: 130_000        # ImageNet-100
  use_anchor: true
  anchor_cells_dir: data/hvbd_static/cells/anchor_core_v1
  curriculum_path: configs/curriculum_default.json
training:
  total_steps: 80000
  minibatch: 32
  lr: 1e-4
  weight_decay: 1e-3
  cosine_eta_floor: 0.1
  ema_decay: 0.999
  prediction: v
  zero_terminal_snr: true
  scale_fit_n: 2048
  amp: true
  checkpoint_every: 1000
  rss_every_ep: 100
sampling:
  diffusion_steps: 200
  ddim_steps: 50
  n_samples: 32
  cfg_scale: 2.0           # CFG sweep at this scale (Stage 3B)
output:
  ckpt_dir: experiments/static_anchor_ablation/vod_300m_hvbd/ckpt
  generated_dir: experiments/static_anchor_ablation/vod_300m_hvbd/generated
  report_path: experiments/static_anchor_ablation/vod_300m_hvbd/report.md
